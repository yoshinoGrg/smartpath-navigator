<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPath Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>SmartPath Navigator</h1>

        <div class="controls">

            <select id="startNode">
                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
            </select>

            <select id="endNode">
                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
            </select>

            <button onclick="findPath()">
                Find Path
            </button>

        </div>

        <canvas id="graphCanvas"
            width="900"
            height="500">
        </canvas>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
