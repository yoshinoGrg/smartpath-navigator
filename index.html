<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPath Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SmartPath Navigator</h1>
        <div class="controls">
            <select id="startNode"></select>
            <select id="endNode"></select>
            <button onclick="findPath()">Find Path</button>
            <button onclick="resetGraph()">Reset</button>
        </div>
        <canvas id="graphCanvas" width="1000" height="500"></canvas>
        <div id="result"></div>
        <p class="hint">Click canvas to add nodes · Click two nodes to connect them with a weight</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
